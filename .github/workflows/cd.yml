name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

permissions:
  contents: read
  packages: write
  issues: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true


jobs:

  # BUILD & PUSH IMAGES
  build-and-push:
    if: ${{ github.event.workflow_run.event == 'push' }}
    name: Build & Push Images to GHCR
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build web image
      - name: Build web image
        uses: docker/build-push-action@v7
        with:
          context: ./web
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/app-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build db image
      - name: Build db image
        uses: docker/build-push-action@v7
        with:
          context: ./db
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/app-db:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # DEPLOY TO STAGING
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images
        run: |
          docker pull ghcr.io/${{ github.repository }}/app-web:${{ github.sha }}
          docker pull ghcr.io/${{ github.repository }}/app-db:${{ github.sha }}

      - name: Start staging stack
        run: |
          # clean old state (important for CI reliability)
          docker rm -f app-web-staging db || true
          docker network rm app-net || true
          docker network create app-net

          # DB container (ALWAYS named "db" for consistency)
          docker run -d \
            --name db \
            --network app-net \
            ghcr.io/${{ github.repository }}/app-db:${{ github.sha }}

          # Web container
          docker run -d \
            --name app-web-staging \
            --network app-net \
            -p 8000:8000 \
            -e DB_HOST=db \
            -e DB_PORT=5432 \
            -e DB_USER=postgres \
            -e DB_PASSWORD=postgres \
            -e DB_NAME=docdb \
            ghcr.io/${{ github.repository }}/app-web:${{ github.sha }}

      - name: Health check
        run: |
          for i in {1..15}; do
            if curl -sf http://localhost:8000/health; then
              echo "Staging is healthy"
              exit 0
            fi
            echo "Waiting for staging..."
            sleep 3
          done

          echo "Staging failed"
          docker logs app-web-staging
          exit 1


  # STAGING SECURITY + DYNAMIC TESTS
  staging-tests:
    name: Staging Validation (Tests + Security)
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test dependencies
        run: pip install pytest requests

      - name: Pull staging image
        run: docker pull ghcr.io/${{ github.repository }}/app-web:${{ github.sha }}

      - name: Start DB container
        run: |
          docker network create app-net || true

          docker run -d \
            --name db \
            --network app-net \
            ghcr.io/${{ github.repository }}/app-db:${{ github.sha }}

      - name: Start staging container
        run: |
          docker network create app-net || true

          docker run -d \
            --name app-web-staging \
            --network app-net \
            -p 8000:8000 \
            ghcr.io/${{ github.repository }}/app-web:${{ github.sha }}

      - name: Wait for service
        run: |
          for i in {1..20}; do
            if curl -sf http://localhost:8000/health; then
              exit 0
            fi
            sleep 3
          done

          docker logs app-web-staging
          exit 1

      - name: Run API tests
        run: pytest -v

      - name: OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: "http://localhost:8000"
          


  # PRODUCTION DEPLOYMENT (MANUAL GATE)
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: staging-tests
    environment:
      name: production

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images
        run: |
          docker pull ghcr.io/${{ github.repository }}/app-web:${{ github.sha }}
          docker pull ghcr.io/${{ github.repository }}/app-db:${{ github.sha }}

      - name: Deploy production stack
        run: |
          docker network create app-net || true

          docker run -d \
            --name app-db-prod \
            --network app-net \
            ghcr.io/${{ github.repository }}/app-db:${{ github.sha }}

          docker run -d \
            --name app-web-prod \
            --network app-net \
            -p 80:8000 \
            ghcr.io/${{ github.repository }}/app-web:${{ github.sha }}

      - name: Verify production health
        run: |
          for i in {1..20}; do
            if curl -sf http://localhost/health; then
              echo "Production is healthy"
              exit 0
            fi
            sleep 3
          done

          echo "Production deployment failed"
          docker logs app-web-prod
          exit 1