name: CI Pipeline

on:
  push:
    branches: [dev, ci_cd_evidence_collection]
  pull_request:
    branches: [dev, ci_cd_evidence_collection]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:

  # SECURITY SCANNING
  security:
    name: Security Scans
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz
          tar -xzf gitleaks_8.24.3_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: |
          gitleaks detect \
            --source . \
            --redact \
            --verbose || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install security tools and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Run Bandit (SAST)
        run: bandit -r web/ || true

      - name: Run dependency scan (pip-audit)
        run: pip-audit || true


  # CODE QUALITY
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
        
      - name: Install dependencies
        run: |
          pip install -r web/requirements.txt

      - name: Install lint tools
        run: pip install pylint

      - name: Run Pylint
        run: |
          pylint web/ || code=$?
          if [ "$code" -eq 1 ]; then
            echo "Pylint crashed - failing CI"
            exit 1
          fi
          echo "Pylint completed (ignoring lint results)"
          exit 0


  # BUILD & INTEGRATION TESTS
  test:
    name: Build & Integration Tests
    runs-on: ubuntu-latest
    needs: [security, lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build containers (cached)
        run: docker compose build || true

      - name: Start services
        run: docker compose up -d || true

      - name: Wait for API (healthcheck loop)
        run: |
          for i in {1..15}; do
            if curl -sf http://localhost:8000/health; then
              echo "App is ready"
              exit 0
            fi
            echo "Waiting for app..."
            sleep 3
          done
          echo "App failed to start"
          docker compose logs || true
          exit 0

      - name: Install test dependencies
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install requirements
        run: pip install -r web/requirements.txt pytest

      - name: Run tests
        run: |
          pytest tests -v \
            --junitxml=reports/junit.xml || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: reports/

      - name: Shutdown services
        if: always()
        run: docker compose down || true


  # DOCKER BUILD (production image)
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (cached)
        uses: docker/build-push-action@v7
        with:
          context: ./web
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/secure-coding-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max